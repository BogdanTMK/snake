<!DOCTYPE html>
<html>
<head>
  <title>Welcome to Snake!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    canvas {
      background: #16213e;
      border: 2px solid #0f3460;
      box-shadow: 0 0 20px rgba(15, 52, 96, 0.5);
    }

    #score {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #00ff88;
      font-family: 'Courier New', monospace;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
      letter-spacing: 2px;
      z-index: 10;             
    }
  </style>
</head>
<body>
  <div id="score">Score: 0</div>
  <canvas id="gameCanvas"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Размеры холста, кратны десяти для ровных клеток
    function resizeCanvas() {
      const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.95);
      const gridSize = Math.floor(size / 10) * 10;
      canvas.width = gridSize;
      canvas.height = gridSize;
    }

    resizeCanvas();
    // Ресайз
    window.addEventListener('resize', () => {
      resizeCanvas();
      drawSnake();
    });

    // Размещение змеи по центру
    function getSnakePosition() {
      const cellSize = 10;
      const cellCount = canvas.width / cellSize;
      const center = Math.floor(cellCount / 2) * cellSize;
      
      return [
        {x: center, y: center},
        {x: center - cellSize, y: center},
        {x: center - cellSize * 2, y: center},
        {x: center - cellSize * 3, y: center},
        {x: center - cellSize * 4, y: center}
      ];
    }
    // Переменные
    let snake = getSnakePosition();
    let dx = 10;
    let dy = 0;
    let foodX;
    let foodY;
    let score = 0;
    let speed = 100;
    let changingDirection = false;
    // 
    function clearCanvas() {
      ctx.fillStyle = '#16213e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = '#0f3460';
      ctx.lineWidth = 2;
      ctx.strokeRect(0, 0, canvas.width, canvas.height);
    }

    // Рисуем

    function drawSnakePart(snakePart) {
      ctx.fillStyle = '#8b0000';
      ctx.shadowColor = '#dc143c';
      ctx.shadowBlur = 2;
      ctx.fillRect(snakePart.x, snakePart.y, 10, 10);
      
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#4a0000';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(snakePart.x, snakePart.y, 10, 10);
    }

    function drawSnake() {
      snake.forEach(drawSnakePart);
    }

    function drawFood() {
      ctx.fillStyle = 'green';
      ctx.strokeStyle = 'darkgreen';
      ctx.fillRect(foodX, foodY, 10, 10);
      ctx.strokeRect(foodX, foodY, 10, 10);
    }

    // Направление 
    document.addEventListener('keydown', changeDirection);
    function changeDirection(event) {
      const LEFT_KEY = 37;
      const RIGHT_KEY = 39;
      const UP_KEY = 38;
      const DOWN_KEY = 40;

      if (changingDirection) return;
      changingDirection = true;
      
      const keyPressed = event.keyCode;
      const goingUp = dy === -10;
      const goingDown = dy === 10;
      const goingRight = dx === 10;
      const goingLeft = dx === -10;
      
      if (keyPressed === LEFT_KEY && !goingRight) {
        dx = -10;
        dy = 0;
      }
      
      if (keyPressed === UP_KEY && !goingDown) {
        dx = 0;
        dy = -10;
      }
      
      if (keyPressed === RIGHT_KEY && !goingLeft) {
        dx = 10;
        dy = 0;
      }
      
      if (keyPressed === DOWN_KEY && !goingDown) {
        dx = 0;
        dy = 10;
      }
    }
    // Движение
    function advanceSnake() {
      const head = {x: snake[0].x + dx, y: snake[0].y + dy};
      snake.unshift(head);
      const didEatFood = snake[0].x === foodX && snake[0].y === foodY;
      if (didEatFood) {
        score += 10;
        speed -= 5;
        document.getElementById('score').textContent = 'Score: ' + score;
        createFood();
      }
      else {
        snake.pop();
      }
    }
    // Game over
    function didGameEnd() {
      for (let i = 4; i < snake.length; i++) {
        const didCollide = snake[i].x === snake[0].x && snake[i].y === snake[0].y;
        if (didCollide) return true;
      }
      
      const hitLeftWall = snake[0].x < 0;
      const hitRightWall = snake[0].x > canvas.width - 10;
      const hitTopWall = snake[0].y < 0;
      const hitBottomWall = snake[0].y > canvas.height - 10;
      
      return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall;
    }
    // Еда
    function randomTen(min, max) {
      return Math.round((Math.random() * (max - min) + min) / 10) * 10;
    }
    function createFood() {
      foodX = randomTen(0, canvas.width - 10);
      foodY = randomTen(0, canvas.height - 10);
      
      snake.forEach(function isFoodOnSnake(part) {
        const foodIsOnSnake = part.x === foodX && part.y === foodY;
        if (foodIsOnSnake) {
          createFood();
        }
      });
    }

    
    clearCanvas();
    drawSnake();

    function main() {
      if (didGameEnd()) return;

      setTimeout(function onTick() {
        changingDirection = false;
        clearCanvas();
        drawFood();
        advanceSnake();
        drawSnake();
        main();
      }, speed);
    }

    // Старт
    createFood();
    main();

  </script>
</body>
</html>
